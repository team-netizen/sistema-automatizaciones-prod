services:
  - type: web
    name: sistema-automatizaciones-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: BACKEND_URL
        value: https://your-backend.onrender.com
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://sistema-automatizaciones-prod.vercel.app

